name: test
channels:
  - conda-forge
dependencies:
  - python=3.14
  # required
  - libpysal
  - numpy
  - pandas
  - scikit-learn
  - scipy
  # testing/formatting
  - codecov
  - pytest
  - pytest-cov
  - pytest-xdist
  # optional
  - bokeh
  - folium
  - geopandas
  - geojson
  - matplotlib
  - mplleaflet
  - numba
  - numexpr
  - seaborn
  - statsmodels
  # for docs build action (this env only)
  - mkdocs-jupyter
  - myst-parser
  - nbsphinx
  - numpydoc
  - pandoc
  - sphinx
  - sphinxcontrib-bibtex
  - sphinx_bootstrap_theme
